version: "3.9"

services:
  backend:
    build: ./backend
    container_name: edgebench-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - edgebench-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock   # optional: Docker monitoring
    environment:
      - DATABASE_URL=sqlite:///./data/edgebench.db
    restart: unless-stopped
    privileged: false
    network_mode: host   # needed for accurate network metrics
    pid: host            # needed for process monitoring

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: edgebench-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  edgebench-data:
